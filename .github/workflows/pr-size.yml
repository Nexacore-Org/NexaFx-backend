name: PR Size Checker

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  size-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const PR = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: files } = await github.rest.pulls.listFiles({
              owner,
              repo,
              pull_number: PR.number
            });

            let added = 0;
            let deleted = 0;

            for (const file of files) {
              added += file.additions;
              deleted += file.deletions;
            }

            const totalChanges = added + deleted;
            const linesAdded = added;

            const largeThreshold = 1500;
            const warningThreshold = 500;

            const body = `## PR Size Analysis

            **Changes: \u002B${linesAdded} / -${deleted} lines** (${totalChanges} total)

            ${linesAdded > largeThreshold
              ? `\u274c **PR exceeds \u0024{${largeThreshold}} lines. Please split this PR into smaller, focused changes.**`
              : linesAdded > warningThreshold
              ? `\u26a0\ufe0f **PR exceeds \u0024{${warningThreshold}} lines. Consider breaking it into smaller PRs for easier review.**
              
              Consider splitting this PR if it addresses multiple concerns.`
              : `\u2705 PR size is within acceptable limits.`}

            <sub>Automated comment from PR Size Checker</sub>`;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: PR.number
            });

            const existingComment = comments.data.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('PR Size Analysis')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: PR.number,
                body
              });
            }

            if (linesAdded > largeThreshold) {
              core.setFailed(`PR exceeds ${largeThreshold} lines (current: ${linesAdded}). Please split into smaller PRs.`);
            }
